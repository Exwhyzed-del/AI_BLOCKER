<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prevention Platform - Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        header {
            background-color: #1e293b;
            padding: 1rem 2rem;
            border-bottom: 1px solid #334155;
        }
        h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        main {
            padding: 2rem;
        }
        .card {
            background-color: #1e293b;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>AI Prevention and Endpoint Control Platform</h1>
    </header>
    <main>
        <div class="card">
            <h2>Device Inventory</h2>
            <p>100 managed devices</p>
        </div>
        <div class="card">
            <h2>Threats Today</h2>
            <p>3 blocked AI attempts</p>
        </div>
    </main>
</body>
</html>
